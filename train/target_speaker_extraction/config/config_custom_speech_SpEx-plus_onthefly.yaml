## Example config for on-the-fly speech mixing from a flat folder of
## <speaker_name>__<index>.flac files.

# Log
seed: 777
use_cuda: 1
precision: bf16 # switch to bf16 to enable CUDA autocast

# dataset
speaker_no: 2
audio_sr: 8000
ref_sr: 8000

# Optional per-partition overrides. If omitted, audio_direc is used for all partitions.
speech_loader: onthefly
speech_train_direc: /home/asultanov/drives/jobs/hanny_ai/new_kurator/.cache/diarization/uz_longform/artifacts/non_overlaps/train
# speech_val_direc: /home/asultanov/drives/jobs/hanny_ai/new_kurator/.cache/diarization/uz_longform/artifacts/non_overlaps/val
speech_test_direc: /home/asultanov/drives/jobs/hanny_ai/new_kurator/.cache/diarization/uz_longform/artifacts/non_overlaps/test
speech_glob_pattern: "*.flac"
speech_samples_per_epoch: 200
speech_min_snr_db: -5
speech_max_snr_db: 5
speech_ref_max_length: 2.5

# Optional Hugging Face Hub upload after training. If hf_repo_id is omitted,
# train.py falls back to HF_REPO from a .env file or the shell environment.
hf_repo_id: akmalsultanov/SpEx-plus-uz
hf_private: 1

# dataloader
num_workers: 24
batch_size: 16
accu_grad: 4
effec_batch_size: 64
max_length: 2

# network settings
init_from: None
causal: 0
network_reference:
  cue: speech
network_audio:
  backbone: SpEx-plus
  L: 20
  N: 256
  X: 8
  R: 4
  B: 256
  H: 512
  P: 3
  norm: gLN
  non_linear: relu
  speakers: 0 # 0 lets train.py infer the number of usable target speakers

# optimizer
loss_type: SpEx-plus
init_learning_rate: 0.005
max_epoch: 2
clip_grad_norm: 5
